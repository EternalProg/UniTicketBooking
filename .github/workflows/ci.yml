name: CI

on: [push, pull_request]

jobs:
  ci:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: mysql://ticket_user:ticket_pass@localhost:3306/ticket_booking
      TEST_DATABASE_URL: mysql://ticket_user:ticket_pass@localhost:3306/ticket_booking_test
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci-access-secret
      JWT_REFRESH_SECRET: ci-refresh-secret

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: ticket_booking
          MYSQL_USER: ticket_user
          MYSQL_PASSWORD: ticket_pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - run: npx prisma migrate deploy

      - run: mysql -h 127.0.0.1 -uroot -prootpass -e "CREATE DATABASE IF NOT EXISTS ticket_booking_test;"

      - run: |
          printf 'NODE_ENV=test\nDATABASE_URL=%s\nREDIS_URL=%s\nJWT_ACCESS_SECRET=%s\nJWT_REFRESH_SECRET=%s\n' \
            "$TEST_DATABASE_URL" "$REDIS_URL" "$JWT_ACCESS_SECRET" "$JWT_REFRESH_SECRET" > .env.test

      - run: npm run db:test:push

      - run: npm run lint

      - run: npm run typecheck

      - run: npm test

      - run: npm run test:integration
